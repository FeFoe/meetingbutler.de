name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/meetingbutler.de

            echo "-> Pulling latest code..."
            git pull origin main

            echo "-> Tagging current image as rollback target..."
            docker tag meetingbutler:latest meetingbutler:previous 2>/dev/null || true

            echo "-> Building new Docker image..."
            docker build -t meetingbutler:latest .

            echo "-> Starting services..."
            docker compose up -d --remove-orphans --force-recreate

            echo "-> Waiting for app to become healthy (up to 90s)..."
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' meetingbutler-app 2>/dev/null || echo "missing")
              echo "  attempt $i: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Health check passed!"
                break
              fi
              if [ "$i" = "18" ]; then
                echo "ERROR: App not healthy after 90s — rolling back!"
                docker tag meetingbutler:previous meetingbutler:latest
                docker compose up -d --remove-orphans --force-recreate
                exit 1
              fi
              sleep 5
            done

            echo "-> Running integration tests..."
            docker compose exec -T app node scripts/test-pipeline-mock.js

            docker compose ps
            echo "Deployed successfully!"
