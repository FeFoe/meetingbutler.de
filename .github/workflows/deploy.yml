name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/meetingbutler.de

            echo "-> Pulling latest code..."
            git pull origin main

            echo "-> Tagging current image as rollback target..."
            docker tag meetingbutler:latest meetingbutler:previous 2>/dev/null || true

            echo "-> Building new Docker image..."
            docker build -t meetingbutler:latest .

            echo "-> Starting services..."
            docker compose up -d --remove-orphans --force-recreate

            echo "-> Health check (waiting up to 60s for app to start)..."
            sleep 15
            for i in 1 2 3 4 5 6; do
              STATUS=$(docker compose exec -T app wget -qO- http://localhost:3000/api/admin/health > /dev/null 2>&1 && echo "200" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "Health check attempt $i failed, retrying in 10s..."
              sleep 10
              if [ "$i" = "6" ]; then
                echo "ERROR: Health check failed after 6 attempts — rolling back!"
                docker tag meetingbutler:previous meetingbutler:latest
                docker compose up -d --remove-orphans --force-recreate
                exit 1
              fi
            done

            echo "-> Running integration tests..."
            docker compose exec -T app node scripts/test-pipeline-mock.js

            docker compose ps
            echo "Deployed successfully!"
